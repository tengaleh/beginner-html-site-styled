apiVersion: apps/v1
kind: Deployment

metadata:
  name: website

spec:
  replicas: 5
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
      - name: website

        image: hemantat/website:latest

        ports:
        - containerPort: 80
